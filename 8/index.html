<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція ПП 12-08</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 8</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: 'Операція "Фарватер"',
        audio1: {
                 file: "NDI8.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція ПП 12-08<br><br>Враховуючи попередній досвід провалу операції «Моноліт», командування прийшло до висновку, що ліквідація С-Свідомості дозволить провести нову операцію швидко та з мінімальними втратами. Влітку 2012 року уряд ухвалив рішення розпочати військову операцію під кодовою назвою «Фарватер». Її метою було встановлення повного контролю над Чорнобильською АЕС та прилеглими територіями.<br><br>На підготовчому етапі військові аналітики та наукові підрозділи склали докладні карти аномальних полів, зафіксувавши зони підвищеної небезпеки й визначивши так званий «фарватер» — умовно безпечний маршрут для просування авіації та наземних сил. Саме цим маршрутом до району ЧАЕС мали висадитися основні підрозділи. Під час виконання завдання операція зазнала провалу: зв’язок із усіма машинами обірвався, подальша доля екіпажів і десанту залишилася невідомою.<br><br>Щоб з’ясувати обставини трагедії, Служба Безпеки України направила у Зону свого агента — колишнього сталкера, майора Олександра Дегтярьова. Працюючи під прикриттям, він мав встановити причини провалу операції «Фарватер», зібрати дані про збиті гелікоптери і, за можливості, знайти та евакуювати тих бійців, кому вдалося вижити. Згодом стане відомо, що вціліла лише одна група на чолі з полковником Ковальським, яка змогла закріпитися в пральному комбінаті в Прип’яті."},
        audio2: {
            file: "KPK8.ogg",
            text: "<strong>Далін:</strong> Витяг із рапорту сержанта СОП зі складу групи «Скат-1»<br><br><strong>Військовий:</strong> Після посадки на гелікоптерному майданчику в районі станції Янів, наша група на чолі з полковником Ковальським, опинилася на замінованій ділянці. Сержант Шлячин підірвався на міні першим, невдовзі після виходу з борта «Скат-1». Оскільки ми вже були на околицях Прип’яті, полковник обрав для евакуації точку Б28 біля кінотеатру «Прометей». Ще біля мінного поля нам зустрівся сталкер, який запропонував допомогу і показав дорогу повз аномальні поля до Прип’яті. Вже в місті ми зіткнулися із запеклим супротивом фанатиків та не змогли дістатися до Б28. Полковник прийняв рішення відійти до прального комбінату. Були організовані патрульні та спостережні пости навколо споруди. Один із патрулів згодом наткнувся на групу сталкерів на чолі з майором СБУ Дегтярьовим, як з’ясувалося. Від себе хочу додати, що це підняло моральний дух бійців, оскільки дехто вже почав боятися, що нас кинули напризволяще.<br><br>На мою суб’єктивну думку, полковник Ковальський діяв відповідно до ситуації, що склалася, коли відправив групу на зачистку медсанчастини, де група потрапила у засідку монолітівців. Провини в провалі операції «Фарватер» немає, оскільки він не мав інформації про зміну розташування аномалій при її плануванні. Морального чи фізичного тиску на мене не здійснював."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
