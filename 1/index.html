<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція ПЗ 86-06</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 1</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Перші експеременти",
        audio1: {
                 file: "NDI1.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція ПЗ 86-06<br><br>26 квітня 1986 року сталася аварія на 4-му реакторі Чорнобильської АЕС. Відбулося масштабне забруднення території радіоактивними речовинами. Усіх мешканців було евакуйовано і створено Чорнобильську Зону Відчуження.<br><br>Після спорудження об’єкта «Укриття», більш відомого як «Саркофаг», радіаційний фон суттєво впав, що дозволяло зробити із Зони Відчуження полігон для цілої низки експериментів. Тому вже у 1987 році там розпочали будівництво Х-лабораторій. Відсутність населення та джерела енергії у вигляді вцілілих трьох реакторів ЧАЕС цьому тільки сприяли.<br><br>1992 рік. Команди вчених розпочали роботу за трьома напрямками: дослідження ноосфери та псі-випромінювання, рекультивація заражених нуклідами земель та зменшення впливу радіації на здоров’я людини, а також розробка нової зброї та програма «Універсальний солдат».<br><br>У 1995 році було проведено експеримент, який мав підтвердити наявність ноосфери. Ідея полягала у впливі через псі-поле на об’єкт на іншій земній півкулі. З науково-дослідницького корабля, який знаходився поряд із ЧАЕС, надіслали сигнал на інше судно у Карибському морі. Крім вдалої передачі сигналу, у результаті цього експерименту на одному з суден утворився альфа-артефакт, а експеримент назвали «Першим Карибським».<br><br>У 1998 році було прийнято рішення спорудити під «Саркофагом» 4-го реактора псі-установку, яку живить альфа-артефакт, а в самій станції розташували лабораторію Х-19, що здійснювала керування установкою та згодом отримала назву «Моноліт».<br><br>У 2001 році після вдалого експерименту з переналаштування елементів радара «Дуга», з ініціативи вчених Лебедєва та Кайманова почалося будівництво антен пригнічувача агресії «Веселка». Його використовували для контролю істот, створених у ході робіт проєкту «Універсальний солдат»: контролерів, бюрерів, псевдогігантів та химер (дивись архів НДІЧАЗ секція МЗ № 3). У подальшому серед сталкерів цей комплекс стане відомим як «Випалювач мізків».<br><br>У цей же час найперспективнішим проєктом зброї обрано виріб № 62, усі інші роботи з виробництва зброї припинено. Науково-виробничу базу перенесено на колишній завод «Юпітер» в околицях Прип’яті.<br><br>У 2006 році доктор Валентин Далін переконав частину своїх колег у можливості під’єднатися до Ноосфери та прибрати з псі-поля людства всі негативні властивості, припинивши війни та створивши світле майбутнє. Група вчених, які погодилися взяти участь в експерименті, назвала себе «С-Свідомість»."
},
        audio2: {
            file: "KPK1.ogg",
            text: "<strong>Далін</strong>: Матеріали КПК № 1. Вилучено у вченого групи «Альфа»<br><br><strong>Вчений:</strong> Вона існує! Те, що ще нещодавно вважалося маргінальною ідеєю в наукових колах, було доведено на практиці! Ми змогли довести існування ноосфери!<br><br>Слід віддати належне професору Каланчі, він зміг налаштувати обладнання судна таким чином, що всі наші піддослідні зразки отримали та виконали команди в точності до найменших деталей. Далін, хитрий щур, спочатку сумнівався в правильності нашого методу, а тепер намагається всіх переконати, що саме він підкинув ідею Кайманову з його ретрансляторами.<br><br>Переглядаючи звіт вимірювання тау-хвиль, на 10-й хвилині, 14-й секунді передачі було виявлено сильний стрибок після чого відбувся суттєвий спад якості сигналу. Згідно з даними, які передала команда науково-дослідного судна, антена №4 була суттєво пошкоджена незрозумілим утворенням, яке утворилося наче нізвідки в приймачі пристрою. Команда вже чекає на нього для більш детального дослідження."
        }
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
