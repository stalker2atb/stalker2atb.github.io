<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція СЧ 34-42</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 48</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Дивна квітка",
        audio1: {
            file: "NDI48.ogg",
            text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція СЧ 34-42<br><br>Дивна квітка — один із видозмінених предметів Зони. Шанси знайти Дивну квітку вкрай низькі — мало кому вдається не заснути під дією аномального макового поля. Аромат квітки здатний приховати її носія від гострого нюху хижаків, але з часом він вивітрюється. Щоб аромат знову набрав сили, треба лягти спати з квіткою на поясі."
        },
        audio2: {
            file: "KPK48.ogg",
            text: "<strong>Далін:</strong> КПК № 48. З розповіді сталкера Морячка<br><br><strong>Сталкер:</strong> Якось пішов на Макове поле в пошуках артефакта. І так, пішов, хоча знав, що це дурість.<br><br>Але ж чим Зона не жартує? Чому не спробувати?<br><br>Поле було красиве до болю в очах — червоне, рівне, ніби хтось розлив червону фарбу на поле, і тоді вона розквітла. Повітря там важке, тягуче. Зробив кілька кроків — і одразу відчув, як ноги налилися свинцем, а думки стали повільні, липкі. Втома накрила не різко, а лагідно. Так, ніби хтось кладе руку на плече й каже: «Сядь. Відпочинь. Ти заслужив». Я зупинився, ледве не впав навколішки. Добре, що Мольфар порадив енергетиками перед походом запастися. Залив у себе банку, не відчуваючи смаку. Серце застукало швидше, але сон нікуди не зник, він просто відійшов на крок.<br><br>Тоді я почув голоси. Спочатку тихі, майже приємні. Хтось сміявся, як старі друзі біля вогнища. Мене переконували, що артефакт уже поруч, варто тільки прилягти й дати очам відпочити. Потім голоси стали ближчими, настирливими. Один шепотів, що він також шукав квітку, але марно. Інший сварився, кричав, що я вкрав його сон і маю повернути.<br><br>Маки хитались, а вітер відривав від них пелюстки і носив над полем. У якийсь момент усі голоси злились в один — теплий, глибокий, який обіцяв тишу. Я майже погодився. Але я вийшов, залишив поле. Вибрався дивом. Коли озирнувся, поле мовчало. Знаєте, я досі інколи чую той голос, коли сильно втомлююся. І боюсь, що коли одного разу він знову покличе — я відповім.<br><br>А артефактів там немає. Можна не ходити."
        }
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
