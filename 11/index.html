<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, справа СЧ 45-68</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 11</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Перші експеременти",
        audio1: {
                 file: "NDI11.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, витяг із особової справи СЧ 45-68<br><br>Позивний: «Полковник Коршунов»<br>Справжнє ім’я: невідоме<br>Вік: 55<br>Фракція: Варта<br>Статус: лідер фракції<br>Досьє відкрито: 28.09.2021<br><br>Походження та підготовка<br>Походить із родини військових. Із шістнадцятирічного віку — курсант училища спецпризначення. Формувався виключно у військовому середовищі, цивільні соціальні моделі поведінки засвоєні слабо. Ранній початок служби зумовив жорстку дисципліну та авторитарний стиль управління.<br><br>Військова кар’єра<br>Перше закордонне відрядження здійснив як «консультант» від СРСР в Африці. Брав участь у війні в Афганістані у званні капітана. Під час однієї з операцій підрозділ потрапив у засідку. Коршунов, прикриваючи відступ, зазнав поранення та вибув із бою. Командування перебрав один із підлеглих лейтенантів, чиї помилкові рішення призвели до катастрофічних втрат і повного провалу операції. Незважаючи на обставини, Коршунов захистив підлеглого від трибуналу, а сам уникнув суду завдяки статусу багаторазово нагородженого ветерана, однак був звільнений зі Збройних Сил без почестей. Цей епізод став ключовим у формуванні його крайньої недовіри до командних структур і людей загалом.<br><br>Перші дії в Зоні<br>У 2015 році Коршунов пристав на пропозицію Агати очолити ключовий силовий ресурс із прямим завданням «захистити НДІЧАЗ і навести порядок у Зоні». Коршунов успадкував агентурну мережу і системно застосовував стратегію «розділяй і володарюй», цілеспрямовано загострюючи внутрішні протиріччя між фракціями. Його дії безпосередньо спричинили розколи у Волі та Долгу.<br><br>Ключові операції<br>Полковник Коршунов організував і провів блискавичну операцію з очищення Хімзаводу від групи сталкерів фракції Іскра. Хімзавод став основною базою Варти в Зоні.<br>Організував операцію «Зеніт», однак не очолив колону через пряму заборону Агати та вимогу перебувати у контрольному залі об’єкту Х-11. Після провалу «Зеніту» ініціював внутрішнє розслідування і поставив Агаті запитання про доцільність понесених втрат. Після ознайомлення з повним планом операції, погодився з необхідністю його реалізації.<br>Полковник відповідав за безпеку НДІЧАЗ під час проведення експерименту з Альфа-артефактом у Х-11. Попри перехоплення групи диверсантів, організованої з колишніх сектантів Моноліту, експеримент провалився і пішов не за планом.<br><br>Психологічний портрет<br>Жорсткий, вольовий, безкомпромісний. Схильний до маніпуляцій і стратегічного мислення. Абсолютно не довіряє сталкерам і цивільним структурам, проте здатен визнавати професіоналізм і лояльність. Для підлеглих може бути як стабільним покровителем, так і смертельно небезпечним противником. Вважає людей ресурсом, але цінує тих, хто довів ефективність і відданість.<br><br>Інтерес та користь для Наглядради<br>Полковник Коршунов є критично важливим активом. Він забезпечує силову стабільність Інституту, захист об’єктів, контроль над ключовими територіями Зони та ефективне стримування сталкерських фракцій. Його агентурна мережа, оперативний досвід і готовність до жорстких рішень роблять його незамінним у фазах ескалації.<br>Водночас Коршунов становить потенційний системний ризик у разі втрати політичного або адміністративного контролю: він діє автономно, мислить категоріями воєнної доцільності й може ігнорувати наукові або етичні обмеження заради досягнення результату. Його лояльність прив’язана не до Наглядради як такої, а до Агати та концепції «порядку будь-якою ціною»."},
        audio2: {
            file: "KPK11.ogg",
            text: "<strong>Далін:</strong> КПК № 11. З особистої переписки сержанта Варти Семиголови<br><br><strong>Сержант Варти:</strong> Кулік, ти питав, чого чайник називаємо «Альфа-артефактом»? Коротше, доповідаю по суті. Було діло на Хімзаводі.<br><br>Ранок починався спокійно. Зона мовчала, тривог не було, мутанти не лізли куди не слід. У контрольному блоці Хімзаводу чергові вирішили скористатися рідкісним затишшям і заварити чай. Старий електрочайник, який виглядає так, наче пережив ще появу Зони, зрадницьки клацнув і вибив автомат.<br><br>Світло згасло якраз у той момент, коли Коршунов зайшов до приміщення чергових.<br><br>Запала тиша. Та сама, від якої в Зоні зазвичай починають молитися навіть ті, хто ніколи не вірив.<br><br>— Доповісти, — спокійно сказав полковник.<br>Черговий, блідий як плоть після викиду, чесно відповів:<br><br>— Товаришу полковнику… чайник.<br><br>Коршунов мовчки подивився на темні монітори, потім на чайник, потім знову на бійця. Пауза затягнулася настільки, що десь далеко мент народився.<br><br>— Отже так, — нарешті промовив Коршунов. — Якщо через чайник я втрачу контроль над обстановкою в Зоні, я почну з чайників. Потім — з тих, хто їх вмикає без дозволу.<br><br>Він сам підняв перемикач автомата, увімкнув живлення. Подивився, як загоряються монітори, і додав:<br>— Чай пийте. Але пам’ятайте: Зона помилок не прощає. Навіть побутових.<br><br>З того дня у Варті з’явився негласний наказ: перед вмиканням будь-якої техніки спершу перевір, чи немає поруч Коршунова. А чайник отримав позивний «Альфа-артефакт»."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
