<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, справа СЧ 32-44</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 12</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Далін",
        audio1: {
                 file: "NDI12.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, витяг із особової справи СЧ 32-44<br><br>Позивний: «Доктор Далін»<br>Справжнє ім’я: Далін Дмитро Валентинович<br>Вік: 40<br>Фракція: НДІЧАЗ<br>Статус: керівник інституту<br>Досьє відкрито: 30.09.2021<br><br>Освіта та біографія<br>Народився наприкінці 1981 року у родині інтелігентів. Батько — Валентин Далін, видатний учений, один із ключових учасників групи С-Свідомість, безпосередньо причетний до експериментів, що завершилися формуванням Зони.<br>Завдяки природним здібностям навчався без особливих зусиль. Вступив на фізичний факультет КНУ ім. Тараса Шевченка, де перші роки демонстративно ігнорував навчальний процес, водночас бездоганно складаючи іспити. Завдяки впливу професора Захарова, змінив своє ставлення до навчання та достроково закінчив університет, а згодом – у рекордний термін захистив кандидатську та докторську дисертації. … Досі згадую пики тих професорів з комісії! Як вони здивувалися, коли вперше мене побачили!<br><br>Діяльність у межах проєкту «Зона» та НДІЧАЗ<br>Невдовзі після утворення НДІЧАЗ зайняв пост директора Інституту. Його погляди на напрямки роботи установи не збігалися з баченням Стрільця, одного з засновників Інституту. Сприймає Зону як родинну справу життя, продовження роботи свого батька.<br>…Так і знав, що батька сюди притягнуть.<br>Зона для нього — не лише науковий феномен, а й незавершений діалог із батьком. Він розглядає її, по-перше, як результат геніальності, що вийшла з-під контролю; по-друге, як доказ того, що людський розум здатен змінювати реальність; по-третє, як помилку, яку або неможливо виправити, або необхідно довести до логічного завершення.<br><br>Взаємодія з Вартою<br>Ставиться до силових структур із прихованою зневагою, однак визнає практичний розум і наполегливість полковника Коршунова. Їхні стосунки ґрунтуються на вимушеній взаємній повазі та балансі інтересів.<br><br>Психологічний портрет<br>Одержимий наукою, пізнанням і розширенням меж можливого. Схильний до ризику в інтелектуальній площині, постійно відчуває спокусу «зазирнути за горизонт», навіть коли це небезпечно. Честолюбний, гостро потребує визнання, наукового статусу.<br>…Без амбіцій нічого робити в НДІЧАЗ, та й взагалі не варто лізти в науку.<br>Не схильний до самопожертви чи аскези: високо цінує власний інтелект та вимагає відповідних умов, ресурсів і свободи дій. За наявності повного забезпечення здатен працювати з надзвичайною інтенсивністю.<br>У роботі з підлеглими — вимогливий, іронічний, психологічно жорсткий, але лояльний: воліє вирішувати проблеми всередині колективу, прикриваючи співробітників від силового втручання Варти. Фізичне насильство зневажає; психологічний тиск вважає допустимим інструментом заради наукової мети.<br><br>Інтерес і користь для Наглядради<br>Доктор Далін є унікальним активом подвійного призначення. З одного боку, він забезпечує безпрецедентний рівень розуміння процесів, пов’язаних із Зоною. З іншого — його особистий мотив, пов’язаний із фігурою Валентина Даліна, створює ризик зміщення пріоритетів з інституційних на особисті.<br><br>Його діяльність потенційно здатна:<br>- відкрити шлях до контролю або трансформації Зони;<br>- відтворити або завершити експерименти С-Свідомості в новій формі;<br>- призвести до повторення критичних помилок, але на вищому рівні складності.<br>Рекомендація: зберігати доктора Дмитра Даліна в активному контурі управління НДІЧАЗ, поєднуючи розширені ресурси з прихованим стратегічним наглядом. Для балансування амбіцій доктора слід залишати його під контролем полковника Коршунова та Агати.<br>…О так, ледь не щодня відчуваю на своїй шиї ланцюг Агати і пронизливий погляд полковника. Часом здається, що вони контролюють кожен крок мого життя."},
        audio2: {
            file: "KPK12.ogg",
            text: "<strong>Далін:</strong> КПК № 12. З пояснювальної записки доктора Дмитра Даліна про необхідність проведення Другого Карибського експерименту<br><br>…у зв’язку з поточним станом аномальної інфраструктури та обмеженими можливостями її контролю вважаю за необхідне повторно порушити питання проведення експерименту подібного до Карибського. Наявні дані свідчать, що Альфа-артефакт є ключовим елементом у функціонуванні установки «Моноліт» та системи Генераторів. Його відсутність зводить нанівець спроби централізованого управління аномальною енергією, залишаючи НДІЧАЗ у позиції реактивного, а не проактивного управління.<br><br>Практика штучного синтезу артефактів, незважаючи на досягнуті успіхи, принципово не дозволяє відтворити властивості Альфа-артефакту. Це підтверджується як експериментальними результатами, так і теоретичними моделями, розробленими на основі матеріалів лабораторії Х-11. Єдине підтверджене походження Альфи — резонансна взаємодія псі-поля ноосфери, зафіксована під час експерименту 1995 року.<br><br>Сам факт спонтанного утворення Альфа-артефакту поза межами Зони доводить, що повторення Карибського експерименту є не лише можливим, а й відтворюваним за умови належного рівня безпеки.<br><br>Відмова від проведення експерименту означатиме стратегічну стагнацію НДІЧАЗ та подальшу втрату контролю над аномальними процесами. Усвідомлюючи ризики, наполягаю: контрольований експеримент значно безпечніший та прогнозованіший за очікування чергового Надвикиду з непередбачуваними наслідками.<br>Директор НДІЧАЗ, доктор Далін Дмитро Валентинович."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
