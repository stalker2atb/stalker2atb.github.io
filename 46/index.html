<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція СЧ 26-92</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 46</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Грозова ягода",
        audio1: {
                 file: "NDI46.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція СЧ 26-92<br><br>Грозова ягода — один із найбільш відомих та міфологізованих артефактів електричної природи. Рідкісність та здатність суттєво підняти витривалість його носія надали артефакту легендарного статусу серед сталкерів.<br><br>Без відповідного захисту володіння артефактом є вкрай небезпечним через його сильну радіоактивність.<br><br>Цікава особливість: при нагріванні понад 78 градусів Цельсія провокує групові галюцинації утопічного типу."},
        audio2: {
            file: "KPK46.ogg",
            text: "<strong>Далін:</strong> КПК № 46. Вилучено з КПК сталкера<br><br><strong>Нейтрал:</strong> Ми тоді стали на ніч між двома корівниками на Кордоні. Місце наче тихе, аномалій небагато, радіація в межах допустимого. Розвели багаття, кинули казанок, хтось дістав консерви. Я скинув рюкзак ближче до вогню, не думаючи про наслідки. Втома така, що байдуже, де що лежить. Уже потім зрозумів, яку дурість зробив.<br><br>Спершу все було як завжди. Тільки вогонь горів якось занадто рівно, без тріску, ніби хтось його налаштував. Ми заговорили — спокійно, без матюків, без напруги. Незвично. І тут я відчув, що мені… добре. По-справжньому добре — так, як давно не було.<br><br>Перед очима Зона почала змінюватися. Наче корівники хтось відбудував наново, стіни пофарбовані, світло проведене. Я бачив, як сталкери йдуть дорогою без зброї, сміються, вітаються одне з одним, ніби тут ніколи не було страху. Один із хлопців сказав, що чує музику. І я теж почув її — тиху, знайому, ніби з дитинства.<br><br>Нас привів до тями різкий тріск — рюкзак спалахнув іскрами. Аж тепер я згадав, що в ньому лежала Грозова ягода, яка нагрілася від багаття. Я чув від інших сталкерів, що таке трапляється, якщо артефакт сильно нагріти, але сам побачив вперше."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
