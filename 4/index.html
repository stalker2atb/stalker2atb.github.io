<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція МС 10-11</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 4</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Рейд Стрільця",
        audio1: {
                 file: "NDI4.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція МС 10-11<br>Літо 2011 року. Група сталкерів, до якої входили Стрілець, Клик та Привид, досягла території Чорнобильської АЕС з метою розгадки загадки виникнення Зони. Їм вдалося обійти аномалії та патрулі Моноліту та проникнути всередину «Саркофагу». У глибині об’єкта вони натрапили на масивні замкнені двері, які неможливо зламати або підірвати звичайними засобами. Клик зголосився виготовити декодер та вирушив на Смітник, щоб добути потрібні деталі у дигерів.<br><br>Під час спроби покинути небезпечну зону ЧАЕС Стрілець отримав важке поранення, що зменшило мобільність групи. Клик та Привид перенесли Стрільця до Доктора, ризикуючи власними життями.<br>Доктору вдалося вилікувати Стрільця. Відновившись, останній вирушив на північ Зони, де отримав нові тяжкі травми у бою з мутантами та знову повернувся до доктора по допомогу. У цьому поході Стрілець знайшов артефакт із загадковими властивостями, який раніше нікому не траплявся у Зоні.<br><br>Серпень 2011 року. Під час чергового походу до центру Зони Стрілець зник безвісти після спроб прорватися всередину Саркофагу, продираючись крізь ряди бійців Моноліту та Чистого Неба."},        
		audio2: {
            file: "KPK4.ogg",
            text: "<strong>Далін:</strong> Матеріали КПК № 4. Знайдено серед голосових щоденників Стрільця.<br><strong>Стрілець:</strong> Я раніше такого ніколи не бачив. Я ще не до кінця розумію його суть, але відчуваю, що цей артефакт слід залишити собі, а не заганяти черговому баризі. Клик і Привид раптом змінили своє ставлення до мене, я став для них лідером. І щось мені здається, що не через те, що я знайшов цей артефакт, а тому що я володію ним.<br><br>Доктор якось не дуже зрадів моїй знахідці. Старий почав його вивчати і щось бурмотіти про його підозрілий псі-вплив. Він не любить усе, що не може пояснити. Краще хай займеться дресируванням монстрів, що зібралися навколо його сховку в очікуванні лікування.<br><br>Я знайшов його! Вже боявся, що хтось почистив мій сховок. Не слід було його ховати! Він міг стати в пригоді. Тепер я його нікому не віддам. Я знаю, що треба Зоні, і він допоможе досягти мети."}};

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
