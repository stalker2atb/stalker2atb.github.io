<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція ПЗ 04-06</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 2</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Аномальна зона",
        audio1: {
                 file: "NDI2.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція ПЗ 04-06<br><br>Після доведення існування ноосфери, своєрідної інформаційної оболонки планети, пов’язаної з усіма розумними істотами, група науковців «С-Свідомість» визначила за мету встановити з нею контакт, щоб створити ідеальний світ, усунувши з ноосфери відомості про людські вади. Спершу вчені розпочали експеримент із простим підключенням, щоб перевірити можливість впливу на неї. Оскільки окрема свідомість не має достатньої сили для взаємодії з ноосферою, учасники проєкту об’єднали свої розуми в єдину структуру за допомогою капсул О-КТА.<br><br>10 червня 2006 року експеримент вийшов з-під контролю. Пробій призвів до вивільнення величезної енергії ноосфери, що впала на Землю, викривляючи реальність навколо. Явище нагадувало палаючий потік світла з неба, а згодом почався землетрус. Більшість військових, що забезпечували охорону Периметру тоді ще звичайної Чорнобильської Зони Відчуження, а також значна частина людей, які перебували на території, загинули миттєво.<br><br>Урядові сили оточили новоутворену Зону та почали направляти всередину розвідгрупи. Жодна з них не досягла поставленої мети, оскільки отримана від розвідгруп інформація була суперечливою та неправдоподібною. Зафіксовано розповіді вцілілих про неймовірні природні аномалії та химерних істот із надприродними здібностями"},
        audio2: {
            file: "KPK2.ogg",
            text: "<strong>Далін:</strong> Матеріали КПК № 2. З витягу рапорту допиту затриманого сталкера<br><br><strong>Боєць МСОП:</strong> Зі слів затриманого встановлено, що в перший день незаконного проникнення на територію Чорнобильської Зони він подолав інженерні загородження у вигляді колючого дроту. Під час руху ледь не потрапив у аномальне утворення невстановленого типу, внаслідок чого особисту флягу було відірвано від рюкзака та закинуто на гілля дерева. Затриманий зазначає, що ураження обмежилося втратою спорядження, тілесних ушкоджень він не отримав. Надалі він повідомляє, що у покинутому житловому будинку виявив артефакт невідомого походження, який за зовнішніми ознаками нагадував деформовану, розплавлену та повторно застиглу деревину. За твердженням затриманого, рівень радіації в приміщенні був підвищеним, тоді як безпосередньо біля артефакту показники дозиметра дорівнювали нулю.<br><br>У другий день перебування в Зоні затриманий вирішив залишитися на ночівлю в одному з покинутих будинків, мотивуючи це небажанням пересуватися у темний час доби через ризик потрапляння в аномалії. Вночі, за його словами, він чув сторонні звуки, які інтерпретував як голоси колишніх мешканців будинку, їхні розмови та сварки. Вранці затриманий зафіксував зміну розташування предметів інтер’єру, зокрема лавки, яка, за його твердженням, напередодні стояла під вікном, а зранку опинилася біля печі.<br><br>У вечірній час другого дня, під час повторного подолання колючого дроту в напрямку з Аномальної Зони, він був виявлений і затриманий військовим патрулем. Усі речі, які несуть радіаційну загрозу або науковий інтерес, у затриманого вилучено та передано вченим для подальшого дослідження."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
