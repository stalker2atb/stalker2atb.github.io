<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція СЧ 55-46</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 1</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Полудень",
        audio1: {
                 file: "NDI32.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція СЧ 55-46<br><br>Походження та формування<br>Після відключення «Випалювача мізків» частина монолітівців утратила віру в своє божество, оскільки С-Свідомість перестала їх контролювати. Роз’єднані та дезорганізовані, колишні адепти Моноліту виявилися легкою здобиччю для Зони та інших фракцій. У цей період один із них, Бродяга, почав цілеспрямовано збирати колишніх братів по вірі, намагаючись дати їм нову мету.<br><br>Ідеологія та внутрішній стан<br>Полудень об’єднує колишніх монолітівців, які намагаються віднайти себе після знищення С-Свідомості та втрати зв’язку з Монолітом. Для більшості з них характерні провали пам’яті, моральна розгубленість і втрата впевненості у власній ідентичності. Попри це, фракція зберігає дисципліну та бойовий потенціал, залишаючись помітною силою в Зоні.<br><br>Територія та статус<br>Починаючи з 2013 року, Полудень осів на Дикому острові. Право фракції на цю територію було додатково закріплене договором «Д-4».<br><br>Лідерство та внутрішні протиріччя<br>Формально Полудень не має офіційного лідера, однак більшість членів вважає таким саме Бродягу.<br><br>Зовнішні відносини<br>Фракція декларує нейтралітет щодо інших сил Зони, однак доступ на Дикий острів суворо обмежений і дозволяється лише в окремих випадках. До представників інших фракцій полуденовці ставляться насторожено. За наявною інформацією, доступ на Дикий острів отримували лише сталкери Скіф та Ріхтер.<br><br>Наукова співпраця<br>Окремим напрямком діяльності Полудня стало очищення територій від радіації та токсинів з метою відновлення можливості безпечного життя. У цьому вони співпрацювали з професором Лодочкою, ученим НТЦ «Малахіт».<br><br>Крах фракції<br>Спроби мирного існування завершилися після невдалого експерименту з Альфа-артефактом у Х-11: у результаті всі члени Полудня знову відчули поклик Моноліту та повернулися під його гіпнотичний вплив. Фракція фактично припинила існувати. Натомість відновилось угруповання сектантів Моноліту"
        },

        audio2: {
            file: "KPK32.ogg",
            text: "<strong>Далін</strong>: Матеріали КПК №32"
        }
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
