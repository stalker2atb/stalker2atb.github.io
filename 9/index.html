<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, справа СЧ 64-47</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 9</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "Скіф",
        audio1: {
                 file: "NDI9.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, витяг із особової справи СЧ 64-47<br><br>Позивний: «Скіф»<br>Справжнє ім’я: Євген Мартиненко<br>Вік: 25<br>Фракція: Нейтрали<br>Статус: сталкер<br>Досьє відкрито: 25.09.2021<br><br>Освіта та особисті риси<br>Має повну загальну середню освіту, закінчив школу зі срібною медаллю. Із юного віку вирізнявся підвищеною допитливістю, схильністю до ризику та тяжінням до конфліктних і небезпечних ситуацій. Характеризувався як особа з нестабільною моделлю поведінки в умовах мирного соціального середовища.<br><br>Військовий досвід та постслужбова адаптація<br>Пройшов строкову військову службу, брав участь у бойових діях. Після демобілізації адаптація до цивільного життя відбувалася зі складнощами. У цей період був залучений до незаконної торгівлі так званими «порожнявками» — артефактами, що втратили активні властивості поза межами Аномальної Зони.<br><br>Інцидент з Альфа-артефактом<br>У 2021 році в помешканні Євгена Мартиненка з’явився об’єкт, попередньо ідентифікований як Альфа-артефакт. Подія завершилася повним знищенням квартири. Доктор Герман запропонував фінансову винагороду за умови підтвердження альфа-класу об’єкта та його перезарядження за допомогою сканера «Топаз» в аномальному полі. З цією метою Мартиненко вирушив у Зону, де невдовзі став жертвою пограбування.<br><br>Пошук сканера<br>Пошукові дії привели Скіфа до колишньої бази фракції Чисте Небо на Болотах. Після нейтралізації захисного псі-випромінювання бази, вступив у контакт із проповідником монолітівців, відомим під псевдонімом Фауст. У ході цих дій Скіф виявив втрачений сканер з артефактом та доставив його до НДІЧАЗ з метою отримати фінансової винагороди за це.<br><br>Участь у подіях біля «Дуги»<br>Після того, як колишній радіолокаційний комплекс «Дуга» був перетворений на випромінювач «Моноліту», Скіф добровільно погодився взяти участь у бойових діях проти фанатиків та відіграв ключову роль у ліквідації лідера монолітівців.<br><br>Взаємодія з НТЦ «Малахіт»<br>За свідченнями агентів, на території НТЦ «Малахіт» Скіф дізнався про існування так званої тонкої матерії — інформаційного середовища, що може зберігати відбитки свідомості всіх живих істот, та взаємодіяв із відбитком учасника групи С-Свідомості.<br><br>Інтерес та ризики для Наглядради<br>Його участь у ключових подіях у Зоні, а також підтверджена здатність виживати й діяти в зонах критичної нестабільності роблять його цінним, але неконтрольованим активом. Рекомендовано постійне приховане спостереження, обмежений доступ до чутливої інформації та використання виключно в рамках контрольованих операцій.<br><br>Поточний статус та невизначені наміри<br>Відомо, що Мартиненко вийшов на контакт зі Стрільцем і Доктором та активно шукає спосіб прориву крізь Рубіж у напрямку Прип’яті. Кінцева мета зазначених дій для Наглядової ради залишається невстановленою. Здійснюється спостереження."},
        audio2: {
            file: "KPK9.ogg",
            text: "<strong>Далін:</strong> Матеріали КПК № 9. З особистих записів доктора Даліна<br><br>Сьогодні з полковником на Териконі я мав цікаву розмову із сталкером на прізвисько Скіф. Він справив на мене враження не героя і не випадкового виконавця, а рідкісного ресурсу, який Зона іноді народжує всупереч власній логіці. У ньому поєднуються витривалість, здатність швидко адаптуватися й відсутність зайвих ілюзій щодо того, ким він є і що робить. Саме такі люди здатні доходити туди, куди наукові експедиції не доходять ніколи. Він чудовий інструмент для досягнення нашої мети: не обтяжений ідеологією, не схильний до зайвих запитань, якщо бачить практичну користь. Він не вимагає пояснень, які можуть поставити під загрозу дослідження, і водночас достатньо розумний, щоб розуміти межі дозволеного. Це робить його ідеальним посередником між теорією та польовою реальністю. Поки що наші цілі збігаються. Але це тимчасово."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
