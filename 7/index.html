<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. 2 Archive - Card View</title>
    <style>
        :root {
            --bg-color: #0e0e0e;
            --card-bg: #1a1a1a;
            --accent: #f36c1c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. Велика сіра рамка, куди входить ВСЕ */
        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .card-image-box {
            margin-bottom: 20px;
        }

        .main-card-img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            color: var(--accent);
        }

        .selector-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .voice-btn {
            background: #252525;
            border: 1px solid #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .voice-btn.active {
            border-color: var(--accent);
            background: rgba(243, 108, 28, 0.1);
            color: var(--accent);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2);
            margin-bottom: 20px;
        }

    .subtitles-console {
    height: 120px;
    overflow-y: auto;
    background: #000000;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    
    /* Шрифт: Roboto Condensed або Arial Narrow дадуть той самий ефект вузьких букв */
    font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    font-size: 1rem;
    line-height: 1.3; /* Зменшено інтервал між рядками */
    
    letter-spacing: 0.6px; /* Майже без розрідження */
    font-weight: 500;
    
    /* Колір: той самий "піщаний" відтінок зі скріншота */
    color: #c9c3a3; 
    
    text-align: left;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}
    
    /* Стилізація скролбару */
    scrollbar-width: thin;
    scrollbar-color: var(--accent) #000;
}

        /* Стилізація скроллбару для Chrome */
        .subtitles-console::-webkit-scrollbar {
            width: 5px;
        }
        .subtitles-console::-webkit-scrollbar-thumb {
            background-color: var(--accent);
            border-radius: 10px;
        }

        /* Стиль для виділеного тексту */
        .subtitles-console b {
            color: #fff;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card-image-box">
        <img src="card.webp" alt="Stalker Card" class="main-card-img">
    </div>

    <h1 id="cardName">Назва Картки</h1>

    
    <div class="btn-group">
        <button id="btn1" class="voice-btn" onclick="selectAudio(1)">Архів НДІЧАЗ, секція ТЧ 12-06
</button>
        <button id="btn2" class="voice-btn" onclick="selectAudio(2)">Матеріали КПК 7</button>
    </div>

    <audio id="player" controls></audio>

    <div class="subtitles-console" id="subs"></div>
</div>

<script>
    // 5. Дані з підтримкою HTML-тегів
    const cardData = {
        name: "С-Свідомість",
        audio1: {
                 file: "NDI7.ogg",
                 text: "<strong>Далін:</strong> Архів НДІЧАЗ, секція ТЧ 12-06<br><br>Коли в Прип’яті тривали бої за можливість закріпитися і контролювати місто, командування СОП вирішило скористатися хаосом, який спричинило вимкнення «Випалювача мізків», і оперативно організувало операцію «Моноліт» для встановлення контролю над ЧАЕС. Попри вдалу висадку десанту з гелікоптерів біля станції, сектанти завзято опиралися штурму військових сталкерів. Військовим вдалося закріпитись на території станції, коли їх застав неочікуваний Викид. Лише кілька військових змогли врятуватися. Серед них — і полковник Ковальський.<br><br>Скориставшись сутичками між військовими сталкерами і монолітівцями, сталкер Стрілець зміг прорватися всередину ЧАЕС перед самим Викидом і відкрити двері до Х-7, використавши неавторизований декодер. Там він зустрівся з представником С-Свідомості, який запропонував пристати до вчених. Сталкер прийняв рішення знищити вчених. Можливий мотив таких дій Стрільця — надія на зникнення аномальної активності у Зоні.<br><br>Ліквідація капсул життєзабезпечення, в яких перебували учасники проєкту, призвела до руйнування керуючої структури, що стримувала хаотичні процеси Зони. Як наслідок, Зона втратила централізований контроль, а її поведінка стала ще менш передбачуваною. Почастішали викиди, змінилися аномальні поля, частина територій зазнала суттєвих трансформацій.<br><br>Угруповання «Моноліт» припинило своє існування. Бійці, позбавлені псі-контролю, гинули, втрачали розум або повільно повертали собі фрагменти власної особистості."},
        audio2: {
            file: "KPK7.ogg",
            text: "<strong>Далін:</strong> Матеріали КПК № 7. Вилучено у полуденівця<br><br><strong>Монолітівець:</strong> Він зник раптово. Як тиск… як гравітація, що тримала усе докупи. Ще вчора кожен крок був правильним, кожен постріл — виправданим, кожна смерть — необхідною. А сьогодні — тиша. Порожнеча, від якої дзвенить у вухах. Я стояв на позиції й чекав наказу. Через звичку, а не наказ. Але наказу немає. Моноліт мовчить. Я намагаюся почути хоч відлуння: шепіт, імпульс, біль у голові, хоч щось. Нічого. Лише вітер і тріск дозиметра. Разом із голосом зникла впевненість. Світ став… важчим і чужим. Раніше він був простим: ворог — ціль, яку слід знищити. Тепер з’явилися питання. Чому в мене тремтять руки? Чому я не пам’ятаю нічого, що було до цього? У голові спливають уривки: накази як спогади. Ці спогади чужі і водночас мої. Невже в мене було життя до цього? На Великій. Бо якщо це правда, тоді ким я був увесь цей час? Коли Моноліт зник, дехто з братів кричав. Хтось стріляв навмання, ніби намагався пробити тишу кулями. Але більшість сидить, притулившись до стін, і дивляться в одну точку. Ми ще разом, але вже не єдині. Немає центру. Немає волі, що тримає нас гуртом. Я не знаю, що робити далі. Моноліту більше немає, є лише Зона. Вона просто є. Холодна, байдужа, агресивна. Якщо в мені лишилось хоч щось людське, мені доведеться навчитися жити з тим, що я зробив. Якщо ні — тоді тиша всередині стане моїм новим Монолітом."}
    };

    const player = document.getElementById('player');
    const subs = document.getElementById('subs');

    // 2 & 3. Функція вибору БЕЗ автоматичного програвання
    function selectAudio(index) {
        // Оновлюємо кнопки
        document.getElementById('btn1').classList.toggle('active', index === 1);
        document.getElementById('btn2').classList.toggle('active', index === 2);

        const current = index === 1 ? cardData.audio1 : cardData.audio2;
        
        // Оновлюємо джерело та текст
        player.src = current.file;
        subs.innerHTML = current.text; // innerHTML замість innerText для обробки <b>
        
        // Скролимо консоль на початок при зміні
        subs.scrollTop = 0;
    }

    // Встановлюємо початковий стан при завантаженні (Запис 1)
    document.getElementById('cardName').innerText = cardData.name;
    selectAudio(1);
</script>

</body>
</html>
